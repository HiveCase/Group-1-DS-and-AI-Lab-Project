<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 650" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="650" fill="#0f172a"/>

  <!-- Title -->
  <text x="440" y="32" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold" letter-spacing="1">SYSTEM ARCHITECTURE OVERVIEW</text>

  <!-- ── USER INPUT BOXES ── -->
  <!-- Vehicle Photographs -->
  <rect x="70" y="52" width="240" height="68" rx="8" fill="#052e16" stroke="#10b981" stroke-width="2"/>
  <text x="190" y="78" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">Vehicle Photograph(s)</text>
  <text x="190" y="98" text-anchor="middle" fill="#6ee7b7" font-size="11">User-uploaded images</text>

  <!-- Policy PDF -->
  <rect x="570" y="52" width="240" height="68" rx="8" fill="#052e16" stroke="#10b981" stroke-width="2"/>
  <text x="690" y="78" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">Insurance Policy PDF</text>
  <text x="690" y="97" text-anchor="middle" fill="#6ee7b7" font-size="11">Chunked &amp; embedded at ingestion</text>

  <!-- Arrow 1: Photos -> YOLO -->
  <line x1="190" y1="120" x2="190" y2="190" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Arrow 2: PDF -> RAG -->
  <line x1="690" y1="120" x2="690" y2="190" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STAGE 1: YOLO ── -->
  <rect x="50" y="192" width="280" height="120" rx="8" fill="#0c1a2e" stroke="#3b82f6" stroke-width="2"/>
  <rect x="50" y="192" width="64" height="20" rx="3" fill="#1d4ed8"/>
  <text x="82" y="206" text-anchor="middle" fill="#bfdbfe" font-size="10" font-weight="bold">STAGE 1</text>
  <text x="190" y="233" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">YOLO Detection Module</text>
  <text x="190" y="254" text-anchor="middle" fill="#94a3b8" font-size="11">Damage classification · Bounding boxes</text>
  <text x="190" y="272" text-anchor="middle" fill="#94a3b8" font-size="11">Confidence scores · Severity estimation</text>
  <text x="190" y="290" text-anchor="middle" fill="#64748b" font-size="10">Minor · Moderate · Severe</text>

  <!-- ── STAGE 2: RAG ── -->
  <rect x="550" y="192" width="280" height="120" rx="8" fill="#0c1a2e" stroke="#3b82f6" stroke-width="2"/>
  <rect x="550" y="192" width="64" height="20" rx="3" fill="#1d4ed8"/>
  <text x="582" y="206" text-anchor="middle" fill="#bfdbfe" font-size="10" font-weight="bold">STAGE 2</text>
  <text x="690" y="233" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">RAG Pipeline</text>
  <text x="690" y="254" text-anchor="middle" fill="#94a3b8" font-size="11">Chunk policy · Bi-encoder embedding</text>
  <text x="690" y="272" text-anchor="middle" fill="#94a3b8" font-size="11">Semantic vector retrieval (FAISS)</text>
  <text x="690" y="290" text-anchor="middle" fill="#64748b" font-size="10">Top-k relevant policy clauses</text>

  <!-- Arrow 3: YOLO -> LLM (diagonal dashed) -->
  <line x1="190" y1="312" x2="368" y2="393" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <!-- Arrow 3 label -->
  <rect x="112" y="326" width="158" height="38" rx="4" fill="#0f172a" opacity="0.92"/>
  <text x="191" y="341" text-anchor="middle" fill="#7dd3fc" font-size="10">Structured detections</text>
  <text x="191" y="357" text-anchor="middle" fill="#7dd3fc" font-size="10">class · bbox · severity</text>

  <!-- Arrow 4: RAG -> LLM (diagonal dashed) -->
  <line x1="690" y1="312" x2="512" y2="393" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <!-- Arrow 4 label -->
  <rect x="610" y="326" width="150" height="38" rx="4" fill="#0f172a" opacity="0.92"/>
  <text x="685" y="341" text-anchor="middle" fill="#7dd3fc" font-size="10">Retrieved clauses</text>
  <text x="685" y="357" text-anchor="middle" fill="#7dd3fc" font-size="10">top-k policy chunks</text>

  <!-- ── STAGE 3: LLM ── -->
  <rect x="290" y="397" width="300" height="98" rx="8" fill="#0c1a2e" stroke="#3b82f6" stroke-width="2"/>
  <rect x="290" y="397" width="64" height="20" rx="3" fill="#1d4ed8"/>
  <text x="322" y="411" text-anchor="middle" fill="#bfdbfe" font-size="10" font-weight="bold">STAGE 3</text>
  <text x="440" y="440" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">LLM Report Generator</text>
  <text x="440" y="461" text-anchor="middle" fill="#94a3b8" font-size="11">Grounded in retrieved policy context</text>
  <text x="440" y="479" text-anchor="middle" fill="#94a3b8" font-size="11">Structured · Source-attributed output</text>

  <!-- Arrow 5: LLM -> Output -->
  <line x1="440" y1="495" x2="440" y2="543" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── OUTPUT ── -->
  <rect x="215" y="545" width="450" height="90" rx="8" fill="#1c1207" stroke="#f59e0b" stroke-width="2"/>
  <text x="440" y="573" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">Claim Assessment Report</text>
  <text x="440" y="594" text-anchor="middle" fill="#94a3b8" font-size="11">Damage table · Severity per region · Applicable policy coverage</text>
  <text x="440" y="614" text-anchor="middle" fill="#94a3b8" font-size="11">Recommended next steps · Gradio Interface · Hugging Face Spaces</text>
</svg>
