<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect width="1000" height="760" fill="#0f172a"/>

  <!-- Orchestrator -->
  <rect x="380" y="48" width="240" height="70" rx="8" fill="#0c1a2e" stroke="#3b82f6" stroke-width="2"/>
  <rect x="380" y="48" width="60" height="18" rx="3" fill="#1d4ed8"/>
  <text x="410" y="61" text-anchor="middle" fill="#bfdbfe" font-size="9" font-weight="bold">CORE</text>
  <text x="500" y="80" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">Agent Orchestrator</text>
  <text x="500" y="100" text-anchor="middle" fill="#94a3b8" font-size="11">Routes claim to specialist agents</text>

  <!-- Human review -->
  <rect x="700" y="48" width="220" height="70" rx="8" fill="#1c1207" stroke="#f59e0b" stroke-width="2"/>
  <text x="810" y="80" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">Human Review</text>
  <text x="810" y="100" text-anchor="middle" fill="#94a3b8" font-size="11">Escalation queue</text>
  <line x1="620" y1="83" x2="700" y2="83" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="660" y="73" text-anchor="middle" fill="#7dd3fc" font-size="9">low confidence</text>

  <!-- Orchestrator -> agents -->
  <line x1="470" y1="118" x2="220" y2="160" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="500" y1="118" x2="480" y2="160" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="530" y1="118" x2="740" y2="160" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Stage 1: three evidence agents -->
  <rect x="90" y="160" width="230" height="110" rx="8" fill="#0c1a2e" stroke="#3b82f6" stroke-width="2"/>
  <rect x="100" y="168" width="60" height="18" rx="3" fill="#1d4ed8"/>
  <text x="130" y="181" text-anchor="middle" fill="#bfdbfe" font-size="9" font-weight="bold">AGENT</text>
  <text x="205" y="205" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">Damage Agent</text>
  <text x="205" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">YOLOv8 detection</text>
  <text x="205" y="244" text-anchor="middle" fill="#64748b" font-size="10">Class · bbox · confidence</text>

  <rect x="350" y="160" width="230" height="110" rx="8" fill="#0c1a2e" stroke="#3b82f6" stroke-width="2"/>
  <rect x="360" y="168" width="60" height="18" rx="3" fill="#1d4ed8"/>
  <text x="390" y="181" text-anchor="middle" fill="#bfdbfe" font-size="9" font-weight="bold">AGENT</text>
  <text x="465" y="205" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">Severity Agent</text>
  <text x="465" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">Area-ratio scoring</text>
  <text x="465" y="244" text-anchor="middle" fill="#64748b" font-size="10">Minor · Moderate · Severe</text>

  <rect x="610" y="160" width="230" height="110" rx="8" fill="#0c1a2e" stroke="#3b82f6" stroke-width="2"/>
  <rect x="620" y="168" width="60" height="18" rx="3" fill="#1d4ed8"/>
  <text x="650" y="181" text-anchor="middle" fill="#bfdbfe" font-size="9" font-weight="bold">AGENT</text>
  <text x="725" y="205" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">Policy Agent</text>
  <text x="725" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">Clause retrieval (RAG)</text>
  <text x="725" y="244" text-anchor="middle" fill="#64748b" font-size="10">Top-k semantic match</text>

  <!-- agents -> tools -->
  <line x1="205" y1="270" x2="205" y2="310" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="465" y1="270" x2="465" y2="310" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="725" y1="270" x2="725" y2="310" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- tool boxes -->
  <rect x="90" y="310" width="230" height="70" rx="8" fill="#111827" stroke="#475569" stroke-width="2"/>
  <text x="205" y="338" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">YOLOv8 Model</text>
  <text x="205" y="357" text-anchor="middle" fill="#94a3b8" font-size="10">Bounding-box detector</text>

  <rect x="350" y="310" width="230" height="70" rx="8" fill="#111827" stroke="#475569" stroke-width="2"/>
  <text x="465" y="338" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">Severity Calculator</text>
  <text x="465" y="357" text-anchor="middle" fill="#94a3b8" font-size="10">Area-ratio scoring function</text>

  <rect x="610" y="310" width="230" height="70" rx="8" fill="#111827" stroke="#475569" stroke-width="2"/>
  <text x="725" y="338" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">ChromaDB</text>
  <text x="725" y="357" text-anchor="middle" fill="#94a3b8" font-size="10">Vector store · policy embeddings</text>

  <!-- Convergence into synthesis stage -->
  <line x1="205" y1="380" x2="430" y2="460" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <rect x="242" y="403" width="150" height="34" rx="4" fill="#0f172a" opacity="0.92"/>
  <text x="317" y="416" text-anchor="middle" fill="#7dd3fc" font-size="9">Detections</text>
  <text x="317" y="430" text-anchor="middle" fill="#7dd3fc" font-size="9">class · bbox · severity</text>

  <line x1="465" y1="380" x2="495" y2="460" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <rect x="400" y="398" width="150" height="34" rx="4" fill="#0f172a" opacity="0.92"/>
  <text x="475" y="411" text-anchor="middle" fill="#7dd3fc" font-size="9">Severity score</text>
  <text x="475" y="424" text-anchor="middle" fill="#7dd3fc" font-size="9">area-ratio value</text>

  <line x1="725" y1="380" x2="570" y2="460" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <rect x="572" y="403" width="150" height="34" rx="4" fill="#0f172a" opacity="0.92"/>
  <text x="647" y="416" text-anchor="middle" fill="#7dd3fc" font-size="9">Policy clauses</text>
  <text x="647" y="430" text-anchor="middle" fill="#7dd3fc" font-size="9">top-k retrieval</text>

  <!-- Stage 2: Report Agent (synthesis) -->
  <rect x="350" y="460" width="300" height="100" rx="8" fill="#0c1a2e" stroke="#3b82f6" stroke-width="2"/>
  <rect x="360" y="468" width="80" height="18" rx="3" fill="#1d4ed8"/>
  <text x="400" y="481" text-anchor="middle" fill="#bfdbfe" font-size="9" font-weight="bold">SYNTHESIS</text>
  <text x="500" y="502" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">Report Agent (LLM)</text>
  <text x="500" y="522" text-anchor="middle" fill="#94a3b8" font-size="11">Synthesizes multi-agent findings</text>
  <text x="500" y="540" text-anchor="middle" fill="#64748b" font-size="10">Structured, source-attributed report</text>

  <!-- Report Agent -> LLM Gateway -->
  <line x1="650" y1="510" x2="680" y2="510" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="680" y="475" width="200" height="70" rx="8" fill="#111827" stroke="#475569" stroke-width="2"/>
  <text x="780" y="503" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">LLM Gateway</text>
  <text x="780" y="522" text-anchor="middle" fill="#94a3b8" font-size="10">Claude API</text>

  <!-- Report Agent -> Output -->
  <line x1="500" y1="560" x2="500" y2="618" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Human review -> Output (manual override), routed clear of all boxes -->
  <polyline points="810,118 810,140 970,140 970,670 725,670" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <rect x="915" y="396" width="120" height="22" rx="4" fill="#0f172a" opacity="0.92" transform="rotate(90 970 405)"/>
  <text x="970" y="405" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold" transform="rotate(90 970 405)">manual override</text>

  <!-- Output -->
  <rect x="275" y="620" width="450" height="100" rx="8" fill="#1c1207" stroke="#f59e0b" stroke-width="2"/>
  <text x="500" y="650" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">Claim Assessment Report</text>
  <text x="500" y="672" text-anchor="middle" fill="#94a3b8" font-size="11">Damage table · Severity per region · Applicable coverage</text>
  <text x="500" y="692" text-anchor="middle" fill="#94a3b8" font-size="11">Recommended next steps · Escalates to Human Review if low confidence</text>
</svg>
